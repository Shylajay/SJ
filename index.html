      background-size: cover;
      background-position: center top;
      filter: brightness(0.55) saturate(0.85);
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.3) 50%,
        rgba(0,0,0,0.55) 100%
      );
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 380px;
      animation: fadeUp 0.9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Profile pic */
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 16px;
      object-fit: cover;
      object-position: center center;
      border: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Name */
    .name {
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      font-size: 1.15rem;
      color: var(--white);
      letter-spacing: 0.01em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
      text-transform: none;
    }

    /* Social icons row */
    .socials {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .socials a {
      color: rgba(255,255,255,0.85);
      transition: color 0.2s, transform 0.2s;
      display: flex;
      align-items: center;
    }

    .socials a:hover {
      color: #fff;
      transform: scale(1.15);
    }

    .socials svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    /* Buttons */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-top: 8px;
      margin-bottom: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      transition: background 0.25s, border-color 0.25s, transform 0.15s;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.9);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-logo {
      width: 44px;
      height: 44px;
      background: transparent;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: absolute;
      left: 8px;
    }

    .btn-text {
      flex: 1;
      text-align: center;
    }

    .btn-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      fill: white;
    }

    @media (max-width: 375px) {
      .page { padding: 30px 16px 40px; }
      .avatar { width: 75px; height: 75px; }
      .name { font-size: 1rem; }
      .btn { padding: 12px 16px; font-size: 0.85rem; }
      .btn-logo { width: 36px; height: 36px; }
      .content { gap: 12px; }
    }

    @media (min-width: 768px) {
      .content { max-width: 420px; }
      .avatar { width: 100px; height: 100px; }
    }
  </style>
</head>

  <script>
    // Force external browser on button clicks
    document.addEventListener('DOMContentLoaded', function() {
      var links = document.querySelectorAll('.btn');
      links.forEach(function(link) {
        link.addEventListener('click', function(e) {
          var ua = navigator.userAgent || '';
          var isInstagram = ua.includes('Instagram');
          var isFacebook = ua.includes('FBAN') || ua.includes('FBAV');
          var isIOS = /iPad|iPhone|iPod/.test(ua);
          var isAndroid = /Android/.test(ua);
          var href = this.href;

          if (isInstagram || isFacebook) {
            e.preventDefault();
            if (isAndroid) {
              window.location = 'intent://' + href.replace(/https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
            } else if (isIOS) {
              var safariUrl = href.replace('https://', 'x-safari-https://');
              window.location = safariUrl;
              setTimeout(function() {
                window.location = href.replace('https://', 'googlechrome://');
              }, 500);
              setTimeout(function() {
                window.open(href, '_blank');
              }, 1000);
            }
          }
        });
      });
    });
